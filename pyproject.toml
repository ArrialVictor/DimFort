[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dimfort"
version = "0.0.1"
description = "Dimensional homogeneity checker for Fortran projects, with LSP support."
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "DimFort contributors" }]
keywords = ["fortran", "static-analysis", "units", "dimensional-analysis", "lsp"]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Fortran",
    "Topic :: Software Development :: Quality Assurance",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    # Fortran parsing — choice TBD (fparser vs lfortran); pinned later
    # LSP framework — choice TBD (likely pygls)
]

[project.optional-dependencies]
lsp = ["pygls>=1.3"]
dev = [
    "pytest>=8",
    "pytest-cov",
    "ruff",
    "mypy",
]

[project.scripts]
dimfort = "dimfort.cli:main"

[project.urls]
Homepage = "https://github.com/"  # TODO: fill in once known
Issues   = "https://github.com/"  # TODO

[tool.hatch.build.targets.wheel]
packages = ["src/dimfort"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src/dimfort"]
