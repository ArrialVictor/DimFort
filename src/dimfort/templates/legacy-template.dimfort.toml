# yard    = { dim = "L", factor = "0.9144",  quantitykind = "Length", aliases = ["yd"] }
# mile    = { dim = "L", factor = "1609.344", quantitykind = "Length", aliases = ["mi"] }
# nmi     = { dim = "L", factor = "1852",     quantitykind = "Length", aliases = ["nautical_mile"] }               # exact
# fathom  = { dim = "L", factor = "1.8288",   quantitykind = "Length", aliases = ["ftm"] }

