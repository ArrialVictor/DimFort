# DimFort legacy / imperial / CGS template
# ============================================================================
#
# Archaeological-code compatibility surface. Every entry is commented out;
# uncomment ONLY what your project genuinely uses.
#
# DimFort's identity is "scientific dimensional analysis for Fortran." The
# entries here exist for users porting or maintaining pre-SI / CGS / imperial
# code. They are NOT recommended for new development.
#
# Schema: see `default_units.toml` header.
# Sources: BIPM SI 9th ed. (Tables 9-10 conversions), DimFort catalog §5 + §6.X(b).

[derived]

# ============================================================================
# CGS (Centimeter-Gram-Second) — catalog §5
# ============================================================================

# --- Mechanical ---
# erg   = { dim = "M*L^2*T^-2", factor = "1e-7", quantitykind = "Energy" }                                          # 10^-7 J
# dyn   = { dim = "M*L*T^-2",   factor = "1e-5", quantitykind = "Force",            aliases = ["dyne"] }            # 10^-5 N
# barye = { dim = "M*L^-1*T^-2", factor = "0.1", quantitykind = "Pressure",         aliases = ["Ba"] }              # 0.1 Pa
# Gal   = { dim = "L*T^-2",     factor = "0.01", quantitykind = "Acceleration",    aliases = ["galileo"] }         # 10^-2 m/s^2 (gravimetry)
# poise = { dim = "M*L^-1*T^-1", factor = "0.1", quantitykind = "DynamicViscosity" }                                # 0.1 Pa·s (symbol "P" collides with peta prefix)
# stokes = { dim = "L^2*T^-1",   factor = "1e-4", quantitykind = "KinematicViscosity", aliases = ["St"] }          # 10^-4 m^2/s

# --- Electromagnetic (CGS-EMU) ---
# gauss   = { dim = "M*T^-2*I^-1", factor = "1e-4", quantitykind = "MagneticFluxDensity" }                          # 10^-4 T (symbol "Gs" would collide with G+s)
# oersted = { dim = "L^-1*I",       factor = "79.5774715459", quantitykind = "MagneticFieldStrength", aliases = ["Oe"] }   # (10^3/4π) A/m
# maxwell = { dim = "M*L^2*T^-2*I^-1", factor = "1e-8", quantitykind = "MagneticFlux", aliases = ["Mx"] }          # 10^-8 Wb

# --- Photometric (CGS) ---
# stilb   = { dim = "J*L^-2", factor = "10000", quantitykind = "Luminance", aliases = ["sb"] }                     # 10^4 cd/m^2
# phot    = { dim = "J*L^-2", factor = "10000", quantitykind = "Illuminance", aliases = ["ph"] }                   # 10^4 lx
# lambert = { dim = "J*L^-2", factor = "3183.0989", quantitykind = "Luminance" }                                   # (10^4/π) cd/m^2

# ============================================================================
# Imperial / US customary — catalog §6.X(b)
# ============================================================================

# --- Length ---
