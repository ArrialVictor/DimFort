name: ci

# Runs on every push to main and every pull request: a slimmed-down
# version of release.yml's test job (single OS + Python version) so
# pushes get a green check in a minute or two without spending the
# full 9-job matrix's worth of compute.
#
# The exhaustive matrix still runs on tag push from release.yml — any
# OS/Python-specific regression is caught there before publishing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lsp]"
      - name: Lint
        run: ruff check .
      - name: Type-check
        run: mypy
      - name: Test
        run: pytest --cov=dimfort --cov-fail-under=75
      - name: Silent-failure regression gate
        # Locks in the 0.2.7 silent-failure audit: hard-bans anti-pattern
        # except blocks, requires `audited(0.2.X)` annotation on new
        # `_notify(...)` and `contextlib.suppress(...)` additions in
        # `src/dimfort/lsp/`. See docs/contributor/silent-failure-audit.md
        # for the baseline this guards.
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || '' }}
        run: |
          if [ -n "$BASE_REF" ]; then
            git fetch --quiet origin "${{ github.base_ref }}"
          fi
          python scripts/silent_failure_gate.py
