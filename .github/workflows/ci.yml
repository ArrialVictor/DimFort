name: ci

# Runs on every push to main and every pull request: a slimmed-down
# version of release.yml's test job (single OS + Python version) so
# pushes get a green check in a minute or two without spending the
# full 9-job matrix's worth of compute.
#
# The exhaustive matrix still runs on tag push from release.yml — any
# OS/Python-specific regression is caught there before publishing.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lsp]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
